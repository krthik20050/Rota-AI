name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'desktop/**'
      - 'requirements.txt'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'desktop/**'
      - 'requirements.txt'
      - '.github/workflows/ci.yml'
  schedule:
    # Full matrix + CVE audit every Monday at 08:00 UTC
    - cron: '0 8 * * 1'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Security: Secrets Scan ──────────────────────────────────────────────────
  secrets-scan:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Lint & Security Static Analysis ────────────────────────────────────────
  lint:
    runs-on: ubuntu-24.04
    needs: secrets-scan
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install lint tools
        run: pip install ruff bandit[toml]

      - name: Ruff lint
        run: ruff check desktop/

      - name: Bandit security scan
        run: |
          bandit -r desktop/ --exclude desktop/tests -ll --format txt -o bandit-report.txt || true
          bandit -r desktop/ --exclude desktop/tests -lll --format txt

      - name: Python syntax check
        run: |
          cd desktop
          python -c "
          import os, py_compile, sys
          errors = []
          for root, dirs, files in os.walk('.'):
            for f in files:
              if f.endswith('.py'):
                path = os.path.join(root, f)
                try:
                  py_compile.compile(path, doraise=True)
                except py_compile.PyCompileError as e:
                  errors.append(f'{path}: {e}')
          if errors:
            for e in errors: print(f'ERROR: {e}')
            sys.exit(1)
          print(f'OK: all Python files pass syntax check')
          "

      - name: Check Windows-only imports in shared code
        run: |
          cd desktop
          python -c "
          import sys, os, ast

          WINDOWS_ONLY = {
              'injection.injector', 'injection.field_detector',
              'injection.field_reader', 'injection.app_detector',
              'audio.hotkey', 'audio.audio_control', 'app.instance_guard',
              'app.hotkey_mixin', 'app.processing_pipeline_mixin',
              'app.recording_state_mixin', 'app.transcriber_mixin',
              'app.service_wiring', 'app.signal_bridges',
              'app.thread_lifecycle_mixin',
          }
          errors = []
          for root, dirs, files in os.walk('.'):
            for f in files:
              if not f.endswith('.py'): continue
              filepath = os.path.join(root, f)
              mod_path = filepath.replace('./', '').replace('/', '.').replace('.py', '')
              with open(filepath) as fh:
                try: tree = ast.parse(fh.read())
                except SyntaxError: continue
              for node in ast.walk(tree):
                if isinstance(node, ast.Import):
                  for alias in node.names:
                    if alias.name in ('win32crypt','win32api','win32con','win32gui','win32process','winreg','pywintypes'):
                      if not any(mod_path.endswith(m) for m in WINDOWS_ONLY):
                        errors.append(f'{filepath}:{node.lineno}: imports {alias.name} (Windows-only)')
                elif isinstance(node, ast.ImportFrom):
                  if node.module and node.module.startswith('win32'):
                    if not any(mod_path.endswith(m) for m in WINDOWS_ONLY):
                      errors.append(f'{filepath}:{node.lineno}: imports from {node.module} (Windows-only)')
          if errors:
            for e in errors: print(f'ERROR: {e}')
            sys.exit(1)
          print('OK: no Windows-only imports in shared code')
          "

  # ── CVE Audit (weekly scheduled only) ──────────────────────────────────────
  cve-audit:
    runs-on: ubuntu-24.04
    needs: lint
    if: github.event_name == 'schedule'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      - name: Dependency CVE audit
        run: |
          pip install pip-audit
          pip install -r requirements.txt --quiet
          pip-audit --requirement requirements.txt --strict

  # ── Windows CI (primary — runs on every PR/push) ────────────────────────────
  windows-ci:
    runs-on: windows-2025
    needs: lint
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        shell: cmd
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install PyQt6 structlog python-dotenv pyperclip pywin32 psutil groq numpy pytest

      - name: Check imports (Windows)
        shell: cmd
        run: |
          cd desktop
          python -c "import sys,os; sys.path.insert(0,'.'); os.environ['QT_QPA_PLATFORM']='offscreen'; from plat import get_hotkey_handler,get_injector,get_window_detector; print('plat: OK'); from PyQt6.QtWidgets import QApplication; print('PyQt6: OK'); from data.config import ConfigManager; print('ConfigManager: OK'); from injection.injector import TextInjector; print('Windows TextInjector: OK'); from data.snippets import SnippetsManager; print('SnippetsManager: OK'); print('All imports OK on Windows')"

      - name: Run unit tests
        shell: cmd
        run: |
          cd desktop
          set PYTHONPATH=%cd%;%PYTHONPATH%
          set QT_QPA_PLATFORM=offscreen
          python -m pytest tests\ -v --tb=short -x

  # ── Full Matrix CI (weekly scheduled only) ─────────────────────────────────
  linux-ci:
    runs-on: ubuntu-24.04
    needs: lint
    if: github.event_name == 'schedule'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libportaudio2 portaudio19-dev \
            libdbus-glib-1-dev libdbus-1-dev \
            at-spi2-core libatk-bridge2.0-0 \
            libsecret-1-dev \
            xvfb xdotool wl-clipboard xclip \
            python3-pyatspi \
            libxcb-xinerama0 libxkbcommon0 libegl1 libgl1 \
            libfontconfig1 libdbus-1-3 libx11-xcb1 libxcb-glx0 \
            libxcb-keysyms1 libxcb-image0 libxcb-shm0 libxcb-icccm4 \
            libxcb-sync1 libxcb-xfixes0 libxcb-shape0 libxcb-randr0 \
            libxcb-render-util0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install PyQt6 structlog python-dotenv pyperclip evdev keyring psutil python-xlib groq numpy pytest pytest-cov

      - name: Check imports (Linux)
        run: |
          cd desktop
          export QT_QPA_PLATFORM=offscreen
          python -c "
          import sys, os
          sys.path.insert(0, '.')
          os.environ['QT_QPA_PLATFORM'] = 'offscreen'
          from plat import get_hotkey_handler, get_injector, get_window_detector
          print('plat imports: OK')
          from PyQt6.QtWidgets import QApplication
          print('PyQt6: OK')
          from data.config import ConfigManager
          print('ConfigManager: OK')
          from data.snippets import SnippetsManager
          print('SnippetsManager: OK')
          print('All imports OK on Linux!')
          "

      - name: Run unit tests with coverage
        run: |
          cd desktop
          export PYTHONPATH="${PWD}:$PYTHONPATH"
          export QT_QPA_PLATFORM=offscreen
          python -m pytest tests/ -v --tb=short -x \
            --cov=. \
            --cov-omit="tests/*,*/__pycache__/*" \
            --cov-report=term-missing \
            --cov-fail-under=50 \
            2>&1 | head -120

  macos-ci:
    runs-on: macos-14
    needs: lint
    if: github.event_name == 'schedule'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install system dependencies
        run: brew install portaudio

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install PyQt6 structlog python-dotenv pyperclip pynput keyring psutil groq numpy pytest pytest-cov
          pip install pyobjc-core pyobjc-framework-Cocoa pyobjc-framework-ApplicationServices pyobjc-framework-Quartz

      - name: Check imports (macOS)
        run: |
          cd desktop
          export QT_QPA_PLATFORM=offscreen
          python - <<'PY'
          import os, sys
          sys.path.insert(0, ".")
          os.environ["QT_QPA_PLATFORM"] = "offscreen"
          from plat import get_hotkey_handler, get_injector, get_window_detector
          HotkeyHandler = get_hotkey_handler()
          TextInjector = get_injector()
          window = get_window_detector()
          print(f"HotkeyHandler: {HotkeyHandler.__name__}")
          print(f"TextInjector: {TextInjector.__name__}")
          print(f"Window detector: {window.__name__}")
          from plat import macos_hotkey, macos_injector, macos_setup, macos_startup, macos_window
          print("macOS platform imports: OK")
          from PyQt6.QtWidgets import QApplication
          print("PyQt6: OK")
          from data.config import ConfigManager
          print("ConfigManager: OK")
          from data.snippets import SnippetsManager
          print("SnippetsManager: OK")
          PY

      - name: Run unit tests
        run: |
          cd desktop
          export PYTHONPATH="${PWD}:$PYTHONPATH"
          export QT_QPA_PLATFORM=offscreen
          python -m pytest tests/ -v --tb=short -x
