name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Security: Secrets Scan (runs before anything else) ──────────────────────
  secrets-scan:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout (full history for secret scanning)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Lint & Syntax Check (fast, runs first) ──────────────────────────────────
  lint:
    runs-on: ubuntu-24.04
    needs: secrets-scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install lint + security tools
        run: pip install ruff bandit[toml] pip-audit

      - name: Ruff lint
        run: ruff check desktop/

      - name: Bandit security scan
        run: |
          bandit -r desktop/ \
            --exclude desktop/tests \
            -ll \
            --format txt \
            -o bandit-report.txt || true
          # Fail on HIGH severity issues
          bandit -r desktop/ \
            --exclude desktop/tests \
            -lll \
            --format txt
        # -ll = medium+, -lll = high only (hard fail)

      - name: Dependency CVE audit
        run: |
          pip install -r requirements.txt --quiet
          pip-audit --requirement requirements.txt --strict

      - name: Check Python syntax (all files)
        run: |
          cd desktop
          python -c "
          import os, py_compile, sys
          count = 0
          errors = []
          for root, dirs, files in os.walk('.'):
            for f in files:
              if f.endswith('.py'):
                path = os.path.join(root, f)
                try:
                  py_compile.compile(path, doraise=True)
                  count += 1
                except py_compile.PyCompileError as e:
                  errors.append(f'{path}: {e}')
          if errors:
            for e in errors:
              print(f'ERROR: {e}')
            sys.exit(1)
          print(f'OK: All {count} Python files pass syntax check')
          "

      - name: Check for Windows-only imports leaking into shared code
        run: |
          cd desktop
          python -c "
          import sys, os, ast

          WINDOWS_ONLY = {
              'injection.injector', 'injection.field_detector',
              'injection.field_reader', 'injection.app_detector',
              'audio.hotkey', 'audio.audio_control', 'app.instance_guard',
              'app.hotkey_mixin', 'app.processing_pipeline_mixin',
              'app.recording_state_mixin', 'app.transcriber_mixin',
              'app.service_wiring', 'app.signal_bridges',
              'app.thread_lifecycle_mixin',
          }

          errors = []
          for root, dirs, files in os.walk('.'):
            for f in files:
              if not f.endswith('.py'):
                continue
              filepath = os.path.join(root, f)
              mod_path = filepath.replace('./', '').replace('/', '.').replace('.py', '')
              with open(filepath) as fh:
                try:
                  tree = ast.parse(fh.read())
                except SyntaxError:
                  continue
              for node in ast.walk(tree):
                if isinstance(node, ast.Import):
                  for alias in node.names:
                    if alias.name in ('win32crypt', 'win32api', 'win32con', 'win32gui', 'win32process', 'winreg', 'pywintypes'):
                      is_win_only = any(mod_path.endswith(m) for m in WINDOWS_ONLY)
                      if not is_win_only:
                        errors.append(f'{filepath}:{node.lineno}: imports {alias.name} (Windows-only)')
                elif isinstance(node, ast.ImportFrom):
                  if node.module and node.module.startswith('win32'):
                    is_win_only = any(mod_path.endswith(m) for m in WINDOWS_ONLY)
                    if not is_win_only:
                      errors.append(f'{filepath}:{node.lineno}: imports from {node.module} (Windows-only)')

          if errors:
            for e in errors:
              print(f'ERROR: {e}')
            sys.exit(1)
          else:
            print('OK: No Windows-only imports in shared code')
          "

  # ── Linux CI ────────────────────────────────────────────────────────────────
  linux-ci:
    runs-on: ubuntu-24.04
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libportaudio2 portaudio19-dev \
            libdbus-glib-1-dev libdbus-1-dev \
            at-spi2-core libatk-bridge2.0-0 \
            libsecret-1-dev \
            xvfb xdotool wl-clipboard xclip \
            python3-pyatspi \
            libxcb-xinerama0 libxkbcommon0 libegl1 libgl1 \
            libfontconfig1 libdbus-1-3 libx11-xcb1 libxcb-glx0 \
            libxcb-keysyms1 libxcb-image0 libxcb-shm0 libxcb-icccm4 \
            libxcb-sync1 libxcb-xfixes0 libxcb-shape0 libxcb-randr0 \
            libxcb-render-util0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install PyQt6
          pip install structlog
          pip install python-dotenv
          pip install pyperclip
          pip install evdev
          pip install keyring
          pip install psutil
          pip install python-xlib
          pip install groq
          pip install numpy
          pip install pytest pytest-cov

      - name: Check Python imports (Linux)
        run: |
          cd desktop
          export QT_QPA_PLATFORM=offscreen
          python -c "
          import sys, os
          sys.path.insert(0, '.')
          os.environ['QT_QPA_PLATFORM'] = 'offscreen'

          from plat import get_hotkey_handler, get_injector, get_window_detector
          print('plat imports: OK')
          HotkeyHandler = get_hotkey_handler()
          print(f'HotkeyHandler: {HotkeyHandler.__name__}')
          Injector = get_injector()
          print(f'TextInjector: {Injector.__name__}')
          from PyQt6.QtWidgets import QApplication
          from PyQt6.QtCore import Qt
          print('PyQt6: OK')
          from data.config import ConfigManager
          print('ConfigManager: OK')
          from data.snippets import SnippetsManager
          print('SnippetsManager: OK')
          from utils.seeder import seed_mock_data
          print('seeder: OK')
          from utils.window_effects import apply_blur
          print('window_effects: OK')
          print('All imports successful on Linux!')
          "

      - name: Run unit tests with coverage
        run: |
          cd desktop
          export PYTHONPATH="${PWD}:$PYTHONPATH"
          export QT_QPA_PLATFORM=offscreen
          python -m pytest tests/ -v --tb=short -x \
            --cov=. \
            --cov-omit="tests/*,*/__pycache__/*" \
            --cov-report=term-missing \
            --cov-fail-under=50 \
            2>&1 | head -120

  # ── Windows CI ──────────────────────────────────────────────────────────────
  windows-ci:
    runs-on: windows-2025
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        shell: cmd
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install PyQt6
          pip install structlog
          pip install python-dotenv
          pip install pyperclip
          pip install pywin32
          pip install psutil
          pip install groq
          pip install numpy
          pip install pytest

      - name: Check Python imports (Windows)
        shell: cmd
        run: |
          cd desktop
          python -c "import sys,os; sys.path.insert(0,'.'); os.environ['QT_QPA_PLATFORM']='offscreen'; from plat import get_hotkey_handler,get_injector,get_window_detector; print('plat: OK'); HH=get_hotkey_handler(); print(f'HotkeyHandler: {HH.__name__}'); I=get_injector(); print(f'TextInjector: {I.__name__}'); from PyQt6.QtWidgets import QApplication; print('PyQt6: OK'); from data.config import ConfigManager; print('ConfigManager: OK'); from injection.injector import TextInjector; print('Windows TextInjector: OK'); from data.snippets import SnippetsManager; print('SnippetsManager: OK'); print('All imports OK on Windows')"

      - name: Run unit tests
        shell: cmd
        run: |
          cd desktop
          set PYTHONPATH=%cd%;%PYTHONPATH%
          set QT_QPA_PLATFORM=offscreen
          python -m pytest tests\ -v --tb=short -x 2>&1

  # ── macOS CI ────────────────────────────────────────────────────────────────
  macos-ci:
    runs-on: macos-14
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          brew update
          brew install portaudio

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install PyQt6 structlog python-dotenv pyperclip pynput keyring psutil groq numpy pytest pytest-cov
          pip install pyobjc-core pyobjc-framework-AppKit pyobjc-framework-ApplicationServices pyobjc-framework-Quartz

      - name: Check Python imports (macOS)
        run: |
          cd desktop
          export QT_QPA_PLATFORM=offscreen
          python - <<'PY'
          import os
          import sys
          sys.path.insert(0, ".")
          os.environ["QT_QPA_PLATFORM"] = "offscreen"

          from plat import get_hotkey_handler, get_injector, get_window_detector
          HotkeyHandler = get_hotkey_handler()
          TextInjector = get_injector()
          window = get_window_detector()
          print(f"HotkeyHandler: {HotkeyHandler.__name__}")
          print(f"TextInjector: {TextInjector.__name__}")
          print(f"Window detector: {window.__name__}")
          from plat import macos_hotkey, macos_injector, macos_setup, macos_startup, macos_window
          print("macOS platform imports: OK")
          from PyQt6.QtWidgets import QApplication
          print("PyQt6: OK")
          from data.config import ConfigManager
          print("ConfigManager: OK")
          from data.snippets import SnippetsManager
          print("SnippetsManager: OK")
          PY

      - name: Run unit tests
        run: |
          cd desktop
          export PYTHONPATH="${PWD}:$PYTHONPATH"
          export QT_QPA_PLATFORM=offscreen
          python -m pytest tests/ -v --tb=short -x
