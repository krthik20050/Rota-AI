name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

# Cancel in-progress runs for the same tag
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  # ── Windows Build ──────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-2025
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set VERSION
        shell: pwsh
        run: |
          $VERSION = $env:GITHUB_REF_NAME -replace '^v',''
          echo "VERSION=$VERSION" >> $env:GITHUB_ENV
          Write-Host "Building version: $VERSION"

      - name: Patch version.py
        shell: pwsh
        run: |
          $VERSION = $env:VERSION
          $path = "desktop/app/version.py"
          $content = Get-Content $path -Raw
          $content = $content -replace '__version__ = ".*?"', "__version__ = `"$VERSION`""
          Set-Content -Path $path -Value $content -NoNewline
          Get-Content $path

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build RotaAI.exe
        run: pyinstaller rota-ai.spec --clean --noconfirm

      - name: Install Inno Setup
        shell: pwsh
        run: |
          winget install JRSoftware.InnoSetup --silent --accept-package-agreements --accept-source-agreements
          Start-Sleep -Seconds 5

      - name: Build RotaAI-Setup.exe
        shell: pwsh
        run: |
          $iscc = "$env:LOCALAPPDATA\Programs\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" }
          if (-not (Test-Path $iscc)) { $iscc = "C:\Program Files\Inno Setup 6\ISCC.exe" }
          Write-Host "Using ISCC at: $iscc"
          if (-not (Test-Path $iscc)) { Write-Error "Inno Setup not found"; exit 1 }
          # Patch installer.iss version before building
          $issPath = "installer.iss"
          $iss = Get-Content $issPath -Raw
          $iss = $iss -replace '#define AppVersion ".*?"', "#define AppVersion `"$env:VERSION`""
          Set-Content -Path $issPath -Value $iss -NoNewline
          New-Item -ItemType Directory -Force -Path installer-output | Out-Null
          & $iscc $issPath
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify installer
        shell: pwsh
        run: |
          $exe = "installer-output\RotaAI-Setup.exe"
          if (-not (Test-Path $exe)) { Write-Error "Installer not found: $exe"; exit 1 }
          $size = (Get-Item $exe).Length
          Write-Host "Installer size: $size bytes"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer-output/RotaAI-Setup.exe
          retention-days: 30

  # ── Linux Build (AppImage) ────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set VERSION
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Building version: $VERSION"

      - name: Patch version.py
        shell: bash
        run: |
          sed -i "s/__version__ = \".*\"/__version__ = \"$VERSION\"/" desktop/app/version.py
          grep __version__ desktop/app/version.py

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libportaudio2 portaudio19-dev \
            libdbus-glib-1-dev libdbus-1-dev \
            at-spi2-core libatk-bridge2.0-0 \
            libsecret-1-dev \
            xvfb xdotool wl-clipboard \
            python3-pyatspi \
            fuse libfuse2 \
            appstream \
            git

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r linux/requirements-linux.txt
          pip install pyinstaller

      - name: Build AppImage
        run: |
          chmod +x linux/build-linux.sh
          ./linux/build-linux.sh

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/RotaAI.AppImage
          retention-days: 30

  # ── Create Release ────────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-appimage

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Rota AI v${{ env.VERSION }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            RotaAI-Setup.exe
            RotaAI.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
