name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  # ── Windows Build ──────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set VERSION
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Building version: $VERSION"

      - name: Patch version.py
        shell: bash
        run: |
          sed -i "s/__version__ = \".*\"/__version__ = \"$VERSION\"/" desktop/app/version.py
          grep __version__ desktop/app/version.py

      - name: Patch installer.iss
        shell: bash
        run: |
          sed -i "s/#define AppVersion \".*\"/#define AppVersion \"$VERSION\"/" installer.iss
          grep AppVersion installer.iss

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build RotaAI.exe
        run: pyinstaller rota-ai.spec --clean --noconfirm

      - name: Install Inno Setup
        shell: pwsh
        run: |
          winget install JRSoftware.InnoSetup --silent --accept-package-agreements --accept-source-agreements
          Start-Sleep -Seconds 5

      - name: Build RotaAI-Setup.exe
        shell: pwsh
        run: |
          $iscc = "$env:LOCALAPPDATA\Programs\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" }
          if (-not (Test-Path $iscc)) { $iscc = "C:\Program Files\Inno Setup 6\ISCC.exe" }
          Write-Host "Using ISCC at: $iscc"
          New-Item -ItemType Directory -Force -Path installer-output | Out-Null
          & $iscc installer.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify installer
        shell: bash
        run: |
          ls -lh installer-output/
          test -f installer-output/RotaAI-Setup.exe || (echo "ERROR: installer not found" && exit 1)

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer-output/RotaAI-Setup.exe

  # ── Linux Build (AppImage) ────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set VERSION
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Building version: $VERSION"

      - name: Patch version.py
        shell: bash
        run: |
          sed -i "s/__version__ = \".*\"/__version__ = \"$VERSION\"/" desktop/app/version.py
          grep __version__ desktop/app/version.py

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libportaudio2 portaudio19-dev \
            libdbus-glib-1-dev libdbus-1-dev \
            at-spi2-core libatk-bridge2.0-0 \
            libsecret-1-dev \
            xvfb xdotool wl-clipboard \
            python3-pyatspi \
            fuse libfuse2 \
            appstream \
            git

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-linux.txt
          pip install pyinstaller

      - name: Build AppImage
        run: |
          chmod +x build-linux.sh
          ./build-linux.sh

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/RotaAI.AppImage

  # ── Create Release ────────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-appimage

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Rota AI v${{ env.VERSION }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            RotaAI-Setup.exe
            RotaAI.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
