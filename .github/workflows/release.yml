name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Parse version from tag (e.g. v1.2.3 → 1.2.3) ──────────────────
      - name: Set VERSION
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Building version: $VERSION"

      # ── 3. Patch version into source files ────────────────────────────────
      - name: Patch version.py
        shell: bash
        run: |
          sed -i "s/__version__ = \".*\"/__version__ = \"$VERSION\"/" desktop/app/version.py
          grep __version__ desktop/app/version.py

      - name: Patch installer.iss
        shell: bash
        run: |
          sed -i "s/#define AppVersion \".*\"/#define AppVersion \"$VERSION\"/" installer.iss
          grep AppVersion installer.iss

      # ── 4. Python setup with pip cache ────────────────────────────────────
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # ── 5. Build PyInstaller bundle ───────────────────────────────────────
      - name: Build RotaAI.exe
        run: pyinstaller rota-ai.spec --clean --noconfirm

      # ── 6. Install Inno Setup 6 ───────────────────────────────────────────
      - name: Install Inno Setup
        shell: pwsh
        run: |
          winget install JRSoftware.InnoSetup `
            --silent `
            --accept-package-agreements `
            --accept-source-agreements
          # Give the installer a moment to finish writing to PATH
          Start-Sleep -Seconds 5

      # ── 7. Build installer ────────────────────────────────────────────────
      - name: Build RotaAI-Setup.exe
        shell: pwsh
        run: |
          $iscc = "$env:LOCALAPPDATA\Programs\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          }
          if (-not (Test-Path $iscc)) {
            $iscc = "C:\Program Files\Inno Setup 6\ISCC.exe"
          }
          Write-Host "Using ISCC at: $iscc"
          New-Item -ItemType Directory -Force -Path installer-output | Out-Null
          & $iscc installer.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # ── 8. Verify output exists ───────────────────────────────────────────
      - name: Verify installer
        shell: bash
        run: |
          ls -lh installer-output/
          test -f installer-output/RotaAI-Setup.exe || (echo "ERROR: installer not found" && exit 1)

      # ── 9. Create GitHub Release and attach installer ─────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Rota AI v${{ env.VERSION }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: installer-output/RotaAI-Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
